<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>DEMM Photo Booths | Premium Mirror & 360 Booth Rental — Tampa Bay & Central Florida</title>
    <meta name="description" content="Florida's premier luxury mirror photo booth & 360 video booth rental. Serving Tampa, Lakeland, Brandon, Riverview, Plant City & Orlando. Packages from $549." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet" />
    <script type="module" crossorigin src="/assets/index-B9u3XhGR.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-BsSWlGyP.css">
    <style>
      /* Urgency Banner */
      .demm-urgency-banner{position:fixed;bottom:0;left:0;right:0;z-index:9998;background:linear-gradient(135deg,#1a1a1a 0%,#0d0d0d 100%);border-top:1px solid rgba(212,175,55,0.3);padding:10px 16px;display:flex;align-items:center;justify-content:center;gap:12px;font-family:'DM Sans',sans-serif;animation:slideUp .5s ease-out 3s both}
      .demm-urgency-banner .urgency-dot{width:8px;height:8px;background:#d4af37;border-radius:50%;animation:pulse-dot 2s ease-in-out infinite;flex-shrink:0}
      .demm-urgency-banner .urgency-text{color:#e0e0e0;font-size:13px;letter-spacing:.02em}
      .demm-urgency-banner .urgency-text strong{color:#d4af37;font-weight:600}
      .demm-urgency-banner .urgency-cta{background:#d4af37;color:#0d0d0d;padding:6px 16px;border-radius:4px;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;text-decoration:none;white-space:nowrap;flex-shrink:0;transition:background .2s}
      .demm-urgency-banner .urgency-cta:hover{background:#e5c44a}
      .demm-urgency-banner .urgency-close{background:none;border:none;color:#888;font-size:18px;cursor:pointer;padding:0 4px;line-height:1;flex-shrink:0}
      @keyframes slideUp{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
      @keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:.4}}
      @media(max-width:640px){.demm-urgency-banner{flex-wrap:wrap;gap:8px;padding:10px 12px}.demm-urgency-banner .urgency-text{font-size:12px;flex:1 1 70%}}
      /* Chat Bubble Widget */
      .demm-chat-bubble{position:fixed;bottom:70px;right:20px;z-index:9999;font-family:'DM Sans',sans-serif}
      .demm-chat-trigger{width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,#d4af37,#b8962e);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(212,175,55,.3);transition:transform .2s,box-shadow .2s}
      .demm-chat-trigger:hover{transform:scale(1.08);box-shadow:0 6px 28px rgba(212,175,55,.45)}
      .demm-chat-trigger svg{width:26px;height:26px;fill:#0d0d0d}
      .demm-chat-tooltip{position:absolute;bottom:68px;right:0;background:#1a1a1a;border:1px solid rgba(212,175,55,.25);border-radius:12px;padding:14px 16px;width:270px;box-shadow:0 8px 32px rgba(0,0,0,.5);animation:fadeInUp .4s ease-out 5s both}
      .demm-chat-tooltip p{color:#e0e0e0;font-size:13px;line-height:1.5;margin:0 0 10px 0}
      .demm-chat-tooltip a{display:inline-block;background:#d4af37;color:#0d0d0d;padding:8px 16px;border-radius:6px;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;text-decoration:none;transition:background .2s}
      .demm-chat-tooltip a:hover{background:#e5c44a}
      .demm-chat-tooltip .tooltip-close{position:absolute;top:6px;right:8px;background:none;border:none;color:#888;font-size:16px;cursor:pointer;line-height:1}
      @keyframes fadeInUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    </style>
  </head>

  <body>
    

    <div id="root"></div>

    <!-- Urgency Banner -->
    <div class="demm-urgency-banner" id="urgencyBanner">
      <span class="urgency-dot"></span>
      <span class="urgency-text" id="urgencyText"></span>
      <a href="#booking" class="urgency-cta" onclick="document.getElementById('urgencyBanner').style.display='none'">Check Your Date</a>
      <button class="urgency-close" onclick="document.getElementById('urgencyBanner').style.display='none'">&times;</button>
    </div>

    <!-- Chat Bubble Widget -->
    <div class="demm-chat-bubble" id="chatBubble">
      <div class="demm-chat-tooltip" id="chatTooltip">
        <button class="tooltip-close" onclick="document.getElementById('chatTooltip').style.display='none'">&times;</button>
        <p>Planning an event in Tampa, Lakeland, or Orlando? Drop your info and we'll get back to you within 2 hours!</p>
        <a href="#booking">Send Inquiry</a>
      </div>
      <button class="demm-chat-trigger" onclick="document.querySelector('#booking').scrollIntoView({behavior:'smooth'})" aria-label="Chat with us">
        <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H5.2L4 17.2V4h16v12z"/></svg>
      </button>
    </div>

    <script>
      (function(){
        var m=['January','February','March','April','May','June','July','August','September','October','November','December'];
        var n=new Date(),nx=m[(n.getMonth()+1)%12],cm=m[n.getMonth()];
        var msgs=[
          '<strong>Limited Availability:</strong> Only a few weekend dates left in '+nx+'. Secure yours before they\u2019re gone.',
          '<strong>Wedding Season Alert:</strong> '+cm+' and '+nx+' dates are booking fast across Tampa Bay.',
          '<strong>Don\u2019t Miss Out:</strong> Most dates book 4\u20138 weeks in advance. Check '+nx+' availability now.'
        ];
        document.getElementById('urgencyText').innerHTML=msgs[n.getDate()%msgs.length];
      })();
    </script>
  </body>

</html>
